<div class="mb-4 text-center">
  <h2 class="fw-bold">Explore Products</h2>
  <p class="text-muted">Choose the best items for your daily retail needs</p>
</div>

<div *ngIf="success" class="alert alert-success">{{ success }}</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<div *ngIf="loading" class="text-center py-5">
  <div class="spinner-border text-primary"></div>
</div>

<div class="row g-4" *ngIf="!loading">
  <div class="col-md-4" *ngFor="let product of products">
    <div class="card h-100 shadow-sm border-0 product-card">
      <img
        [src]="product.imageUrl || 'https://via.placeholder.com/300x200'"
        class="card-img-top product-img"
        alt="product">

      <div class="card-body d-flex flex-column">
        <h5 class="card-title fw-semibold">{{ product.name }}</h5>
        <p class="text-muted small">{{ product.description }}</p>
        <p class="fw-bold text-primary mb-2">₹ {{ product.price }}</p>
        <p class="small mb-3">Stock: {{ product.stock }}</p>

        <div class="mt-auto d-flex gap-2">
          <a [routerLink]="['/products', product.id]" class="btn btn-outline-primary w-50">View</a>
          <button
            class="btn btn-warning w-50"
            *ngIf="authService.isLoggedIn()"
            (click)="addToCart(product.id)">
            Add Cart
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
