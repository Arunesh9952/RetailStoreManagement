<div class="container">
  <div class="row align-items-center min-vh-95 g-5">

    <!-- LEFT: LOGIN FORM -->
    <div class="col-md-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <h3 class="fw-bold text-center mb-4">Login</h3>

          <div *ngIf="error" class="alert alert-danger">
            {{ error }}
          </div>

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label>Email</label>
              <input
                type="email"
                class="form-control"
                [(ngModel)]="formData.email"
                name="email"
                required
              />
            </div>

            <div class="mb-3">
              <label>Password</label>
              <input
                type="password"
                class="form-control"
                [(ngModel)]="formData.password"
                name="password"
                required
              />
            </div>

            <button class="btn btn-dark w-100">Login</button>
          </form>
        </div>
      </div>
    </div>

    <!-- RIGHT: IMAGE -->
    <div class="col-md-7 d-none d-md-block">
      <div class="image-container">
        <img
          src="https://media.istockphoto.com/id/1194709125/photo/grocery-shopping.jpg?s=612x612&w=0&k=20&c=wiusAs8MGMElfjz-aTea35tAkgu2a2bLCoRVtba_qLY="
          alt="login"
          class="img-fluid rounded-4 shadow"
        />
      </div>
    </div>

  </div>
</div>
